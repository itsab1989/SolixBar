name: Build & Test

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build, test, and package
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Build release binary (universal)
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Package app bundle
        run: |
          SOLIXBAR_BIN=".build/apple/Products/Release/SolixBar" sh scripts/package_app.sh
          codesign --force --deep -s - outputs/SolixBar.app
          ditto -c -k --sequesterRsrc --keepParent outputs/SolixBar.app SolixBar-macOS.zip

      - name: Upload render snapshots
        uses: actions/upload-artifact@v4
        with:
          name: ui-renders
          path: .build/renders/
          if-no-files-found: ignore

      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: SolixBar-macOS
          path: SolixBar-macOS.zip

      - name: Attach bundle to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES="Hinweis: Das Bundle ist ad-hoc signiert. Beim ersten Start: Rechtsklick -> Oeffnen. / Note: The bundle is ad-hoc signed. First launch: right-click -> Open."
          gh release create "${GITHUB_REF_NAME}" --generate-notes --notes "$NOTES" || true
          gh release upload "${GITHUB_REF_NAME}" SolixBar-macOS.zip --clobber
