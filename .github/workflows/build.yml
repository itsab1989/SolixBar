name: Build & Test

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build, test, and package
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          # Volle Historie: der Release-Changelog listet Commits seit dem
          # vorherigen Tag.
          fetch-depth: 0

      - name: Swift version
        run: swift --version

      # Schutz gegen vergessene VERSION-Datei: Tag und VERSION müssen
      # übereinstimmen, sonst trägt das Release die falsche Nummer.
      - name: Verify tag matches VERSION (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag ${GITHUB_REF_NAME} passt nicht zur VERSION-Datei (${FILE_VERSION})." >&2
            exit 1
          fi

      - name: Run tests
        run: swift test

      - name: Build release binary (universal)
        run: swift build -c release --arch arm64 --arch x86_64

      # Portable Python-Laufzeit für den direkten SOLIX-Modus. Die Laufzeit
      # ist arm64-only (wie die Runner); auf Intel-Macs bleiben Demo-,
      # Befehl- und URL-Modus voll nutzbar.
      - name: Prepare SOLIX runtime
        run: sh scripts/prepare_solix_runtime.sh

      - name: Package app bundle
        run: |
          SOLIXBAR_BIN=".build/apple/Products/Release/SolixBar" sh scripts/package_app.sh
          sh scripts/verify_release.sh outputs/SolixBar.app
          ditto -c -k --sequesterRsrc --keepParent outputs/SolixBar.app SolixBar-macOS.zip

      - name: Upload render snapshots
        uses: actions/upload-artifact@v4
        with:
          name: ui-renders
          path: .build/renders/
          if-no-files-found: ignore

      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: SolixBar-macOS
          path: SolixBar-macOS.zip

      - name: Attach bundle to release with changelog (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Prefer the hand-written CHANGELOG.md entry for this version (has
          # the real DE/EN release notes); fall back to the raw commit log
          # since the previous tag so release notes are never empty.
          BODY=$(awk "/^## ${VERSION} /{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md | sed '/^[[:space:]]*$/d')
          if [ -z "$BODY" ]; then
            PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
            if [ -n "$PREV_TAG" ]; then
              COMMITS=$(git log --no-merges --pretty='- %s' "${PREV_TAG}..${GITHUB_REF_NAME}")
              BODY=$(printf '## Changelog\n%s\n\nKompletter Diff: https://github.com/%s/compare/%s...%s' "$COMMITS" "${GITHUB_REPOSITORY}" "$PREV_TAG" "${GITHUB_REF_NAME}")
            else
              COMMITS=$(git log --no-merges --pretty='- %s' "${GITHUB_REF_NAME}")
              BODY=$(printf '## Changelog\n%s' "$COMMITS")
            fi
          fi
          {
            echo "Hinweis: Das Bundle ist ad-hoc signiert. Beim ersten Start: Rechtsklick -> \"Oeffnen\"."
            echo "Note: The bundle is ad-hoc signed. First launch: right-click -> \"Open\"."
            echo
            printf '%s\n' "$BODY"
            echo
            echo "---"
            echo "☕ SolixBar ist kostenlos und bleibt es. Wenn es dir nützt, ist ein Kaffee eine nette Art, Danke zu sagen — völlig optional."
            echo "☕ SolixBar is free and always will be. If it's useful to you, a coffee is a kind way to say thanks — completely optional."
            echo
            echo "[![Support SolixBar on Ko-fi](https://ko-fi.com/img/githubbutton_sm.svg)](https://ko-fi.com/itsab1989)"
          } > release-notes.md
          gh release create "${GITHUB_REF_NAME}" --title "SolixBar ${GITHUB_REF_NAME}" --notes-file release-notes.md || true
          gh release upload "${GITHUB_REF_NAME}" SolixBar-macOS.zip --clobber
