name: Sync README version

# On a stable release tag (e.g. v0.4.3), update the "Current version" line in
# README.md on main so it never drifts behind the VERSION file. Pre-release
# tags (-alpha/-beta/-rc/-pre) are skipped — the README tracks the latest
# stable release only.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag whose version to sync into the README (e.g. v0.4.3)'
        required: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag and skip pre-releases
        id: ver
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          case "$TAG" in
            *-alpha*|*-beta*|*-rc*|*-pre*)
              echo "Pre-release tag $TAG — leaving README on the latest stable version."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
              echo "skip=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Checkout default branch
        if: steps.ver.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update version line and push if changed
        if: steps.ver.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          sed -i -E "s#(Aktuelle Version / Current version: \`)[0-9]+\.[0-9]+\.[0-9]+(\`)#\1${VERSION}\2#" README.md
          if git diff --quiet -- README.md; then
            echo "README version already at ${VERSION} — nothing to do."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: sync README version to ${VERSION}"
          git push origin HEAD:main
